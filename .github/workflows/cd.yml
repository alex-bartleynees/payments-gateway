name: Build and Deploy with Helm
on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore integration tests
        run: dotnet restore tests/Gateway.IntegrationTests/Gateway.IntegrationTests.csproj

      - name: Run integration tests
        run: >
          dotnet test tests/Gateway.IntegrationTests/Gateway.IntegrationTests.csproj
          --configuration Release
          --no-restore
          --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: "**/test-results.trx"
          if-no-files-found: ignore

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate build ID
        id: tag
        run: echo "build_id=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          secrets: |
            github_packages_token=${{ secrets.GITHUB_TOKEN }}
          tags: |
            creativefree/payments-gateway:latest
            creativefree/payments-gateway:${{ steps.tag.outputs.build_id }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: "latest"

      - name: Set Git user info
        run: |
          git config --global user.email "${{ secrets.GIT_EMAIL }}"
          git config --global user.name "${{ secrets.GIT_NAME }}"

      - name: Update values.yaml with build tag
        run: |
          sed -i "s/tag: .*/tag: ${{ steps.tag.outputs.build_id }}/" deployment/helm-charts/payments-gateway/values.yaml
          git add deployment/helm-charts/payments-gateway/values.yaml
          git commit -m "Update image tag to ${{ steps.tag.outputs.build_id }}"
          git push origin main

      - name: Package and Push Helm Chart
        run: |
          helm package ./deployment/helm-charts/payments-gateway
          helm push payments-gateway-*.tgz oci://registry-1.docker.io/creativefree
